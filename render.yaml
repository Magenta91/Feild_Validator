services:
  - type: web
    name: xeno-validator-backend
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: |
      python --version
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
